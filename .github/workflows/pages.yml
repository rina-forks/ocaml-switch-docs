name: Deploy with GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: agle/bincaml

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"

      - id: month
        run: |
          python3 -c 'from datetime import *; print(datetime.now().strftime("month=%m"))' >> "$GITHUB_OUTPUT"
          printf 'ocaml=%s\n' "$(ocaml --version | tr -d '[:space:][a-zA-Z],')" >> "$GITHUB_OUTPUT"
        shell: bash

      - id: cache
        uses: actions/cache/restore@v5
        with:
          key: bincaml-opam-${{ runner.os }}-${{ steps.month.outputs.ocaml }}-${{ hashFiles('**/*.opam') }}-${{ steps.month.outputs.month }}
          restore-keys: |
            bincaml-opam-${{ runner.os }}-${{ steps.month.outputs.ocaml }}-${{ hashFiles('**/*.opam') }}-
            bincaml-opam-${{ runner.os }}-${{ steps.month.outputs.ocaml }}
          # exclude opam compiler paths which are cached by setup-ocaml
          path: |
            _opam
            !_opam/bin/ocaml*
            !_opam/lib/ocaml
            _opam/lib/ocamlformat*

      - name: Install dependencies
        run: |
          opam option --global 'archive-mirrors+="https://opam.ocaml.org/cache"'
          opam repository add pac https://github.com/uq-pac/opam-repository.git
          opam install . --deps-only --with-doc
          opam install odoc-driver

      - if: always() && steps.cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          key: bincaml-opam-${{ runner.os }}-${{ steps.month.outputs.ocaml }}-${{ hashFiles('**/*.opam') }}-${{ steps.month.outputs.month }}
          path: |
            _opam
            !_opam/bin/ocaml*
            !_opam/lib/ocaml
            _opam/lib/ocamlformat*

      - name: Build documentation
        run: |
          opam pin add .
          opam exec -- odoc_driver

      - run: |
          cd _html
          echo ${{ secrets.SECRET_KEY }} > ${{ secrets.SECRET_KEY }}.txt
          printf 'google-site-verification: %s' "${{ secrets.SECRET_KEY2 }}" > "${{ secrets.SECRET_KEY2 }}"
          find . -name '*.html' | sed 's ^\. https://rina-forks.github.io/ocaml-switch-docs ' > sitemap.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _html

  # Deployment job
  deploy:
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
